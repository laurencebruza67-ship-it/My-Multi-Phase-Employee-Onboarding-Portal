<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Onboarding Portal</title>
    <!-- Include Bootstrap 5 CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="app.js" defer></script>
</head>
<body class="bg-light py-5">

<div class="container" style="max-width: 600px;">
    <!-- Progress Indicator Layout Bar -->
    <div class="d-flex justify-content-between mb-4 text-center fw-bold">
        <span id="step1Indicator" class="text-primary border-bottom border-3 border-primary pb-1 flex-fill">1. Full Name</span>
        <span id="step2Indicator" class="text-muted pb-1 flex-fill">2. Address Blocks</span>
        <span id="step3Indicator" class="text-muted pb-1 flex-fill">3. Final Summary</span>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white text-center py-3">
            <h2 class="h5 mb-0">Employee Registration Portal</h2>
        </div>
        <div class="card-body p-4">
            
            <!-- Dynamic Alert for Validation Blocks -->
            <div id="validationAlert" class="alert alert-danger py-2 d-none"></div>

            <!-- ================= PHASE 1: FULL NAME ================= -->
            <div id="phase1" class="phase-section">
                <h3 class="h6 mb-3 text-secondary uppercase fw-bold">PART 1: LEGAL NAME ATTRIBUTES</h3>
                <div class="mb-3">
                    <label class="form-label small fw-bold">First Name *</label>
                    <input type="text" id="firstName" class="form-control" placeholder="e.g., Laurence ">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Middle Name</label>
                    <input type="text" id="middleName" class="form-control" placeholder="e.g., Dulce (Leave blank if none)">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Last Name</label>
                    <input type="text" id="lastName" class="form-control" placeholder="e.g., Bruza  ">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Extension Name (Jr., Sr., III)</label>
                    <input type="text" id="extName" class="form-control" placeholder="e.g., Jr.">
                </div>
                <div class="row g-2 mb-4">
                    <div class="col-4">
                        <label for="userAge" class="form-label small fw-bold text-secondary mb-1">Age</label>
                        <input type="number" id="userAge" class="form-control" placeholder="Age" min="18" max="99">
                    </div>
                    <div class="col-8">
                        <label for="userGender" class="form-label small fw-bold text-secondary mb-1">Gender</label>
                        <select id="Gender" class="form-select">
                            <option value="" selected disabled>Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Prefer not to say">Prefer not to say</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="Date-birth" class="form-label small fw-bold">Date of Birth</label><br>
                    <input type="date" id="Datebirth" class="form-control" name="date_of_birth" required>
                </div>
                <button id="nextToPhase2" class="btn btn-primary w-100 fw-bold mt-2">Next Phase: Addresses</button>
            </div>

            <!-- ================= PHASE 2: ADDRESSES ================= -->
            <div id="phase2" class="phase-section d-none">
                <h3 class="h6 mb-3 text-secondary uppercase fw-bold">PART 2: RESIDENTIAL LOCATION DATA</h3>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Current Living Address *</label>
                    <input type="text" id="currentAddress" class="form-control" placeholder="Street, Barangay, City">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Permanent Legal Address *</label>
                    <input type="text" id="permanentAddress" class="form-control" placeholder="Street, Barangay, City">
                </div>
                <button id="nextToPhase3" class="btn btn-success w-100 fw-bold mt-2">Generate Final Records</button>
            </div>

            <!-- ================= PHASE 3: SUMMARY DISPLAY ================= -->
            <div id="phase3" class="phase-section d-none">
                <h3 class="h6 mb-3 text-success uppercase fw-bold">PART 3: SANITIZED HR DATA PROFILE</h3>
                <div class="bg-light p-3 border rounded mb-3">
                    <p class="mb-1"><strong>Processed Corporate Name:</strong></p>
                    <p id="previewName" class="text-dark bg-white p-2 border rounded font-monospace">--</p>

                    <p class="mb-1"><strong>User Data:</strong></p>
                    <p id="previewData" class="text-dark bg-white p-2 border rounded font-monospace">--</p>
                    
                    <p class="mb-1 mt-3"><strong>Current Registered Address:</strong></p>
                    <p id="previewCurrent" class="text-dark bg-white p-2 border rounded font-monospace">--</p>
                    
                    <p class="mb-1 mt-3"><strong>Permanent Registered Address:</strong></p>
                    <p id="previewPermanent" class="text-dark bg-white p-2 border rounded font-monospace">--</p>
                </div>
                <button id="restartBtn" class="btn btn-outline-secondary w-100 fw-bold">Reset Form Interface</button>
            </div>

        </div>
    </div>
</div>

</body>
</html>
